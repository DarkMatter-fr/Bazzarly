<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bazzarly - Premium E-Commerce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">Bazzarly</div>
  <input type="text" id="search" placeholder="Search premium products...">
  <div class="nav">
    <button onclick="showPage('home')" id="nav-home" class="active-nav">Home</button>
    <button onclick="showPage('cart')" id="nav-cart">Cart (<span id="cartCount">0</span>)</button>
    <button onclick="showPage('shopkeeper')" id="nav-shop" style="display:none;">My Shop</button>
    <button onclick="showPage('login')" id="nav-login">Login</button>
    <button onclick="logout()" id="nav-logout" style="display:none;">Logout</button>
  </div>
</header>

<!-- HOME PAGE -->
<div id="home" class="page active">
  <div class="container" id="products"></div>
</div>

<!-- CART PAGE -->
<div id="cart" class="page">
  <h2>Your Premium Cart</h2>
  <div id="cartItems"></div>
  <h3 id="total" style="color: #ff8a00;">Total: ₹0</h3>
  <button class="btn-primary" onclick="checkout()">Secure Checkout</button>
</div>

<!-- SHOPKEEPER DASHBOARD -->
<div id="shopkeeper" class="page">
  <div class="form-container">
    <h2>Add New Product</h2>
    <input type="text" id="prod-name" placeholder="Product Name">
    <input type="number" id="prod-price" placeholder="Price (₹)">
    <button class="btn-primary" onclick="addProduct()">List Item For Sale</button>
  </div>
  
  <div class="form-container" style="max-width: 600px; margin-top: 40px; background: rgba(0,0,0,0.3);">
    <h2>Your Listed Products</h2>
    <div id="shopkeeper-inventory" style="width: 100%;"></div>
  </div>
</div>

<!-- LOGIN / REGISTER PAGE -->
<div id="login" class="page">
  <div class="form-container">
    <h2>Welcome to Bazzarly</h2>
    
    <div class="role-selector">
      <label><input type="radio" name="role" value="customer" checked> Customer</label>
      <label><input type="radio" name="role" value="shopkeeper"> Shopkeeper</label>
    </div>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    
    <button class="btn-primary" onclick="doLogin()" style="margin-bottom: 10px;">Login</button>
    <button class="btn-primary" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);" onclick="doRegister()">Register</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
